name: Build APK

on:
  push:
    branches: [ main ] # Vérifie si ta branche s'appelle "main" ou "master"
  workflow_dispatch: # Permet de lancer la compilation manuellement

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout le code
        uses: actions/checkout@v4

      - name: Configurer Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Donner les permissions à Gradle
        run: chmod +x gradlew

      - name: Build APK Debug
        run: ./gradlew assembleDebug

      - name: Télécharger l'APK
        uses: actions/upload-artifact@v4
        with:
          name: mon-application-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          
